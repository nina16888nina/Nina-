<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>客製化轉運站</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FFFDF9] text-slate-800 font-sans">
  <div id="app"></div>

  <script>
    const SITUATIONS = [
      { id: 'love', label: '感情問題', emoji: '💖', border: 'border-pink-200' },
      { id: 'wealth', label: '財運提升', emoji: '💰', border: 'border-yellow-200' },
      { id: 'career', label: '事業轉運', emoji: '🚀', border: 'border-blue-200' },
      { id: 'family', label: '家運穩固', emoji: '🏡', border: 'border-green-200' },
      { id: 'study', label: '小孩課業', emoji: '📖', border: 'border-purple-200' }
    ];

    const RECOMMENDATIONS = {
      love: {
        ritual: '桃花轉運・貴人引動祈福 🌹',
        products: ['人緣鹽 🧼', '能量香氛 ✨', '芙蓉精油 🌿'],
        advice: '💖 感情對症下藥：求對象、合盤除小人、減少爭吵，讓彼此更好溝通，找回甜蜜磁場。'
      },
      wealth: {
        ritual: '鎮煞護財・補財庫祈福 🧧',
        products: ['招財鹽 🪙', '羅盤化煞 🧭', '能量香氛 ✨'],
        advice: '💰 財運對症下藥：除了補財庫，建議諮詢專屬財位「安財甕」，鎖住財氣不漏財。'
      },
      career: {
        ritual: '斬小人・事業破局祈福 ⚔️',
        products: ['羅盤化煞 🧭', '淨化鹽 🧂', '能量香氛 ✨'],
        advice: '🚀 事業對症下藥：掌控流年大運，針對辦公桌位化煞，提升貴人助力，避開是非。'
      },
      family: {
        ritual: '祭祖孝親・穩定家運祈福 🕯️',
        products: ['淨化鹽 🧂', '芙蓉沐浴乳 🛀', '羅盤化煞 🧭'],
        advice: '🏡 家運對症下藥：陽宅磁場校正，找出不和諧因素，針對個人八字調整居住能量。'
      },
      study: {
        ritual: '文昌開運・心神安定祈福 📝',
        products: ['芙蓉精油 🌿', '淨化鹽 🧂', '能量香氛 ✨'],
        advice: '📖 課業對症下藥：找出個人文昌方位。針對學習弱點進行引導，安定心神，事半功倍。'
      }
    };

    let selectedId = null;

    function handleLineRedirect() {
      if (!selectedId) return;

      const currentSit = SITUATIONS.find(s => s.id === selectedId);
      const currentRec = RECOMMENDATIONS[selectedId];

      const message =
        `老師您好！我想預約諮詢 ✨\n` +
        `📍 我的狀況：${currentSit.label} ${currentSit.emoji}\n` +
        `🕯️ 建議祈福：${currentRec.ritual}\n` +
        `📦 建議配套：${currentRec.products.join('、')}\n\n` +
        `我想針對我的問題「對症下藥」進行一對一諮詢！🎯\n翻轉運勢找安沂，順遂不遲疑！`;

      const finalUrl = `https://line.me/R/msg/text/?${encodeURIComponent(message)}`;
      window.location.href = finalUrl;
    }

    function renderHome() {
      return `
        <header class="bg-white border-b-4 border-yellow-300 py-12 px-4 text-center shadow-sm">
          <div class="inline-block bg-yellow-100 rounded-full px-4 py-1 text-yellow-700 font-bold text-xs mb-3">
             🌸 專業命理諮詢・對症下藥
          </div>
          <h1 class="text-3xl font-black text-slate-900 mb-2">客製化轉運站</h1>
          <p class="mt-2 text-slate-600 font-black text-base tracking-wide">
            翻轉運勢找安沂，順遂不遲疑 ✨
          </p>
        </header>

        <main class="max-w-md mx-auto px-4 py-8">
          <div class="space-y-6">
            <h2 class="text-xl font-bold text-slate-700 flex items-center justify-center gap-2">
              <span class="text-yellow-500">⭐</span>
              請選取您的諮詢類別
            </h2>
            <div class="grid grid-cols-1 gap-4">
              ${SITUATIONS.map((sit) => `
                <button
                  onclick="selectSituation('${sit.id}')"
                  class="flex items-center p-6 bg-white rounded-[2rem] border-2 ${sit.border} shadow-[4px_4px_0px_0px_rgba(0,0,0,0.05)] active:translate-y-1 transition-all text-left w-full"
                >
                  <span class="text-4xl mr-4">${sit.emoji}</span>
                  <span class="text-lg font-black text-slate-800 flex-1">${sit.label}</span>
                  <span class="text-yellow-400 text-xl">⚡</span>
                </button>
              `).join('')}
            </div>
          </div>
        </main>

        <footer class="text-center text-slate-300 text-[10px] pb-10">
          © 專業命理諮詢服務 🌸 心誠則靈
        </footer>
      `;
    }

    function renderResult() {
      const currentRec = RECOMMENDATIONS[selectedId];
      const currentSit = SITUATIONS.find(s => s.id === selectedId);

      return `
        <header class="bg-white border-b-4 border-yellow-300 py-12 px-4 text-center shadow-sm">
          <div class="inline-block bg-yellow-100 rounded-full px-4 py-1 text-yellow-700 font-bold text-xs mb-3">
             🌸 專業命理諮詢・對症下藥
          </div>
          <h1 class="text-3xl font-black text-slate-900 mb-2">客製化轉運站</h1>
          <p class="mt-2 text-slate-600 font-black text-base tracking-wide">
            翻轉運勢找安沂，順遂不遲疑 ✨
          </p>
        </header>

        <main class="max-w-md mx-auto px-4 py-8">
          <div class="space-y-6">
            <button
              onclick="goBack()"
              class="flex items-center font-bold text-slate-400 hover:text-indigo-600"
            >
              ← 返回重新選擇
            </button>

            <div class="bg-white rounded-[2.5rem] shadow-xl border-4 border-slate-900 overflow-hidden">
              <div class="bg-slate-900 p-8 text-center text-white">
                <div class="text-5xl mb-3">${currentSit.emoji}</div>
                <h2 class="text-2xl font-black italic">諮詢方案已備妥</h2>
              </div>

              <div class="p-8 space-y-8">
                <section class="bg-pink-50 rounded-3xl p-5 border-2 border-pink-100">
                  <div class="flex items-center text-pink-600 mb-2 font-black">
                    <span class="mr-2">🎯</span> 專家點撥建議：
                  </div>
                  <p class="text-sm font-bold text-slate-700 leading-relaxed">
                    ${currentRec.advice}
                  </p>
                </section>

                <section class="bg-indigo-50 rounded-3xl p-5 border-2 border-indigo-100">
                  <div class="text-xs text-indigo-400 font-bold mb-3 uppercase tracking-widest">
                    推薦開運配套
                  </div>
                  <div class="flex flex-wrap gap-2">
                    ${currentRec.products.map((p) => `
                      <span class="bg-white px-3 py-1 rounded-full text-xs font-bold text-indigo-600 border border-indigo-100">
                        ${p}
                      </span>
                    `).join('')}
                  </div>
                </section>

                <div class="pt-2">
                  <div class="bg-green-50 rounded-2xl p-4 mb-6 border border-green-100 flex items-start gap-3">
                    <span class="text-green-500 shrink-0 text-lg">✨</span>
                    <p class="text-[11px] text-green-700 font-bold leading-normal">
                      點擊按鈕將直接帶入諮詢內容，您只需按下「發送」即可預約！
                    </p>
                  </div>

                  <button
                    onclick="handleLineRedirect()"
                    class="w-full bg-[#06C755] text-white font-black py-6 rounded-[2rem] shadow-[0_8px_0_0_#059641] active:translate-y-[4px] active:shadow-none transition-all text-xl flex items-center justify-center"
                  >
                    <span class="mr-3 text-2xl">💬</span>
                    私訊老師對症下藥 🚀
                  </button>
                </div>
              </div>
            </div>
          </div>
        </main>

        <footer class="text-center text-slate-300 text-[10px] pb-10">
          © 專業命理諮詢服務 🌸 心誠則靈
        </footer>
      `;
    }

    function renderApp() {
      document.getElementById('app').innerHTML = selectedId ? renderResult() : renderHome();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function selectSituation(id) {
      selectedId = id;
      renderApp();
    }

    function goBack() {
      selectedId = null;
      renderApp();
    }

    renderApp();
  </script>
</body>
</html>
