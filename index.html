<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>安沂拾光</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: #f3f0ec;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      color: #5a4a42;
    }

    button {
      font: inherit;
    }

    .app-shell {
      width: 100%;
      max-width: 448px;
      background: #fdfaf8;
      border-radius: 50px;
      overflow: hidden;
      border: 10px solid #ffffff;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.16);
      position: relative;
      height: 820px;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 40px 32px 0;
      text-align: center;
      flex-shrink: 0;
    }

    .handle {
      width: 48px;
      height: 4px;
      background: #e5d9cf;
      margin: 0 auto 24px;
      border-radius: 999px;
    }

    .brand-title {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      color: #8e7d6f;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      margin: 4px 0 0;
      color: #b5a496;
      font-size: 10px;
      letter-spacing: 0.25em;
      line-height: 1.7;
      font-weight: 500;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    .hidden {
      display: none !important;
    }

    .intro {
      text-align: center;
      color: #5a4a42;
      margin: 0 0 40px;
      font-size: 14px;
      line-height: 1.8;
    }

    .category-list,
    .quiz-list {
      display: grid;
      gap: 16px;
    }

    .category-btn,
    .quiz-btn {
      width: 100%;
      border: 1px solid #f0e6dd;
      background: #ffffff;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #5a4a42;
    }

    .category-btn:hover,
    .quiz-btn:hover,
    .result-btn:hover,
    .back-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.06);
    }

    .category-btn {
      display: flex;
      align-items: center;
      gap: 20px;
      text-align: left;
      padding: 20px;
      border-radius: 30px;
    }

    .category-icon-wrap {
      width: 56px;
      height: 56px;
      min-width: 56px;
      border-radius: 18px;
      background: #f9f6f3;
      color: #c5b4a2;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .category-btn:hover .category-icon-wrap {
      background: #c5b4a2;
      color: #ffffff;
    }

    .category-main {
      flex: 1;
    }

    .category-title {
      font-size: 16px;
      font-weight: 700;
      color: #5a4a42;
      margin: 0 0 4px;
    }

    .category-subtitle {
      font-size: 10px;
      color: #b5a496;
      margin: 0;
      line-height: 1.6;
    }

    .chevron {
      width: 18px;
      height: 18px;
      color: #d7c7ba;
      flex-shrink: 0;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: none;
      color: #b5a496;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 32px;
      cursor: pointer;
      padding: 0;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: #8e7d6f;
      margin: 0 0 24px;
    }

    .quiz-list {
      gap: 16px;
    }

    .quiz-btn {
      text-align: left;
      padding: 24px;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }

    .quiz-btn:hover {
      border-color: #c5b4a2;
    }

    .quiz-text {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.7;
      padding-right: 16px;
    }

    .result-card {
      background: #ffffff;
      padding: 32px;
      border-radius: 40px;
      border: 1px solid #f0e6dd;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
      text-align: center;
    }

    .result-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 32px;
      color: #c5b4a2;
    }

    .result-box {
      text-align: left;
      background: #fdfcfb;
      padding: 28px;
      border-radius: 30px;
      color: #5a4a42;
      line-height: 1.9;
      font-size: 15px;
      margin-bottom: 32px;
      border: 1px solid #f5f0ed;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.03);
    }

    .result-btn {
      width: 100%;
      border: none;
      background: #c5b4a2;
      color: #ffffff;
      border-radius: 20px;
      font-weight: 700;
      padding: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 16px 24px rgba(0,0,0,0.12);
      transition: transform 0.15s ease;
    }

    .result-btn:active {
      transform: scale(0.97);
    }

    .result-note {
      margin: 16px 0 0;
      font-size: 10px;
      color: #b5a496;
      line-height: 1.6;
    }

    .bottom-nav {
      height: 80px;
      background: #ffffff;
      border-top: 1px solid #f3f0ec;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 48px;
      flex-shrink: 0;
    }

    .nav-icon-active {
      color: #c5b4a2;
    }

    .nav-icon-muted {
      color: #e5e7eb;
    }

    .icon {
      width: 22px;
      height: 22px;
      display: inline-block;
    }

    .icon-lg {
      width: 24px;
      height: 24px;
      display: inline-block;
    }

    .icon-sm {
      width: 18px;
      height: 18px;
      display: inline-block;
    }

    .fade-in {
      animation: fadeIn 0.45s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 8px;
      }

      .app-shell {
        height: 92vh;
        border-radius: 32px;
      }

      .header {
        padding: 32px 20px 0;
      }

      .content {
        padding: 20px;
      }

      .result-card {
        padding: 24px;
      }

      .bottom-nav {
        padding: 0 28px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="header">
      <div class="handle"></div>
      <div id="homeHeader" class="fade-in">
        <h1 class="brand-title">安沂拾光</h1>
        <p class="brand-subtitle">我是會預測孩子今天會不會哭鬧的命理師 Nina</p>
      </div>
    </div>

    <div class="content">
      <section id="homeView" class="fade-in">
        <p class="intro">親愛的，讓空間與靈魂深呼吸<br>找回屬於您的光亮方位</p>
        <div id="categoryList" class="category-list"></div>
      </section>

      <section id="quizView" class="hidden fade-in">
        <button id="backBtn" class="back-btn" type="button">
          <span id="backIcon"></span>
          <span>Back to menu</span>
        </button>
        <h2 id="quizTitle" class="section-title"></h2>
        <div id="quizList" class="quiz-list"></div>
      </section>

      <section id="resultView" class="hidden fade-in">
        <div class="result-card">
          <div class="result-icons">
            <span id="shieldIcon"></span>
            <span id="compassIcon"></span>
            <span id="flameIcon"></span>
          </div>
          <div id="resultText" class="result-box"></div>
          <button id="resultBtn" class="result-btn" type="button">
            <span id="calendarIcon"></span>
            <span id="resultBtnText"></span>
          </button>
          <p class="result-note">點擊後將自動發送訊息至 Nina 官方 LINE</p>
        </div>
      </section>
    </div>

    <div class="bottom-nav">
      <span id="navHome"></span>
      <span id="navUsers"></span>
      <span id="navUser"></span>
    </div>
  </div>

  <script>
    const categories = {
      mom: {
        id: 'mom',
        icon: "baby",
        title: "育兒教養",
        subtitle: "情緒 / 唱反調 / 八字諮詢",
        questions: [
          { text: "情緒起伏大，動不動就尖叫大哭", result: "【能量分析：情緒風暴期】建議報名【小孩八字諮詢】，由 Nina 深度拆解孩子的情緒地雷，並配合羅盤校正房間氣場。" },
          { text: "愛唱反調、你說東他偏要往西", result: "【能量分析：意志力碰撞】代表孩子天生帶有極強自主星。建議透過【小孩八字諮詢】確認孩子屬性，並在文昌位放置淨化海鹽。" },
          { text: "學習不專心、坐不住、容易分心", result: "【能量分析：文昌頻率偏移】建議預約【小孩八字諮詢】，找出適合的學習方式，並用羅盤定位文昌位。" },
          { text: "社交恐懼、在外面退縮不敢說話", result: "【能量分析：保護色過重】建議進行【收驚祈福】，並透過【小孩八字諮詢】了解人際財星，建立安全感。" }
        ]
      },
      love: {
        id: 'love',
        icon: "heart",
        title: "感情人際",
        subtitle: "爛桃花 / 婆媳 / 感情修復",
        questions: [
          { text: "總是遇到不對的人，爛桃花不斷", result: "【能量分析：磁場招陰】您的紅鸞位可能落入了『空亡』或受穢氣干擾。建議先以【能量海鹽】洗滌，由 Nina 透過【斬斷孽緣祈福】清理負能，並用羅盤重新定位正緣方位。" },
          { text: "感情中一直被騙、被劈腿或被背叛", result: "【能量分析：防禦網崩解】這源於個人氣場的破洞。建議進行【識人明智祈福】，並使用羅盤檢測家中的『合和位』是否受損，避免招惹渣男體質。" },
          { text: "在感情中極度卑微、容易自我懷疑", result: "【能量分析：自我頻率過低】建議進行【自信回歸祈福】。透過【小孩八字/個人八字諮詢】了解您的情緣屬性，找回在愛情中的主導權。" },
          { text: "單身許久，感覺桃花能量被阻擋", result: "【能量分析：桃花滯留】建議先以開運海鹽洗滌，再以【羅盤】尋找您的『紅鸞位』布置。建議參與【良緣祈福】啟動引力。" },
          { text: "婆媳育兒觀念衝突、生活被干預", result: "【能量分析：能量侵蝕】建議羅盤檢測『避煞位』，預約【空間隔離祈福】與家運諮詢，守住小家庭防線。" }
        ]
      },
      general: {
        id: 'general',
        icon: "briefcase",
        title: "個人運勢",
        subtitle: "事業升遷 / 財運 / 避小人",
        questions: [
          { text: "事業遇到瓶頸，升遷總是被壓制", result: "【能量分析：氣運受壓】建議以【羅盤】重新定出辦公室『青龍位』，並安排【官祿祈福】點亮事業燈。" },
          { text: "有財無庫，錢賺得多但守不住", result: "【能量分析：財庫漏水】建議以【羅盤】精準定位『明財位』放置海鹽座，並預約【補財庫祈福】封堵漏點。" },
          { text: "職場小人造謠，名譽受到毀損", result: "【能量分析：暗影入侵】建議以【羅盤】避開辦公桌『三煞位』。搭配【避小人祈福】建立能量盾牌。" },
          { text: "法律訴訟膠著、判決不如預期", result: "【能量分析：紛擾籠罩】建議羅盤測量住家『延年位』，安排【消災化厄祈福】轉化官司壓力。" }
        ]
      },
      home: {
        id: 'home',
        icon: "home",
        title: "家運風水",
        subtitle: "除穢 / 病符 / 鄰里干擾",
        questions: [
          { text: "家人莫名生病，且查不出原因", result: "【能量分析：病符入宅】建議以【羅盤】找出『二黑病符位』進行掃除，搭配【健康祈福】與海鹽大淨化。" },
          { text: "鄰居磁場干擾，或是對門煞氣重", result: "【能量分析：外煞衝擊】建議在門口使用羅盤定位，安設避煞物品，並由 Nina 進行【安宅護佑祈福】。" },
          { text: "搬新家後事事不順，爭吵變多", result: "【能量分析：地靈磨合失敗】建議以【羅盤】重新定出家主旺位，配合【入厝補運祈福】儀式重整氣場。" }
        ]
      }
    };

    const state = {
      step: 'home',
      currentCategory: null,
      selectedQuiz: null
    };

    function iconSvg(name, cls = "icon") {
      const common = `class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"`;
      const icons = {
        chevronRight: `<svg ${common}><path d="m9 18 6-6-6-6"/></svg>`,
        home: `<svg ${common}><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>`,
        heart: `<svg ${common}><path d="m12 21-1.9-1.7C5 14.8 2 12.1 2 8.8 2 6 4.2 4 7 4c1.7 0 3.4.8 5 2.5C13.6 4.8 15.3 4 17 4c2.8 0 5 2 5 4.8 0 3.3-3 6-8.1 10.5L12 21z"/></svg>`,
        user: `<svg ${common}><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>`,
        users: `<svg ${common}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
        baby: `<svg ${common}><circle cx="12" cy="8" r="4"/><path d="M10 3c1.5 0 2.5 1 2.5 2.5"/><path d="M8 14h8"/><path d="M7 21v-3a5 5 0 0 1 10 0v3"/></svg>`,
        compass: `<svg ${common}><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-2.12 6.36-6.36 2.12 2.12-6.36z"/></svg>`,
        calendar: `<svg ${common}><path d="M8 2v4"/><path d="M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/></svg>`,
        arrowLeft: `<svg ${common}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>`,
        flame: `<svg ${common}><path d="M12 3s4 4 4 8a4 4 0 1 1-8 0c0-2 1-4 4-8z"/><path d="M12 13s2 2 2 4a2 2 0 1 1-4 0c0-1 0.5-2 2-4z"/></svg>`,
        shieldCheck: `<svg ${common}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>`,
        briefcase: `<svg ${common}><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><path d="M2 12h20"/></svg>`
      };
      return icons[name] || '';
    }

    function setFixedIcons() {
      document.getElementById('backIcon').innerHTML = iconSvg('arrowLeft', 'icon-sm');
      document.getElementById('shieldIcon').innerHTML = iconSvg('shieldCheck', 'icon-sm');
      document.getElementById('compassIcon').innerHTML = iconSvg('compass', 'icon-sm');
      document.getElementById('flameIcon').innerHTML = iconSvg('flame', 'icon-sm');
      document.getElementById('calendarIcon').innerHTML = iconSvg('calendar', 'icon-sm');
      document.getElementById('navHome').innerHTML = `<span class="nav-icon-active">${iconSvg('home')}</span>`;
      document.getElementById('navUsers').innerHTML = `<span class="nav-icon-muted">${iconSvg('users')}</span>`;
      document.getElementById('navUser').innerHTML = `<span class="nav-icon-muted">${iconSvg('user')}</span>`;
    }

    function renderCategories() {
      const categoryList = document.getElementById('categoryList');
      categoryList.innerHTML = '';

      Object.keys(categories).forEach((key) => {
        const cat = categories[key];
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'category-btn';
        btn.innerHTML = `
          <div class="category-icon-wrap">${iconSvg(cat.icon, 'icon-lg')}</div>
          <div class="category-main">
            <div class="category-title">${cat.title}</div>
            <div class="category-subtitle">${cat.subtitle}</div>
          </div>
          <span class="chevron">${iconSvg('chevronRight', 'icon-sm')}</span>
        `;
        btn.addEventListener('click', () => handleCategorySelect(key));
        categoryList.appendChild(btn);
      });
    }

    function renderQuiz() {
      const quizTitle = document.getElementById('quizTitle');
      const quizList = document.getElementById('quizList');
      quizTitle.textContent = `${state.currentCategory.title}諮詢`;
      quizList.innerHTML = '';

      state.currentCategory.questions.forEach((q, idx) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'quiz-btn';
        btn.innerHTML = `
          <span class="quiz-text">${q.text}</span>
          <span class="chevron">${iconSvg('chevronRight', 'icon-sm')}</span>
        `;
        btn.addEventListener('click', () => handleQuizSelect(idx));
        quizList.appendChild(btn);
      });
    }

    function renderResult() {
      const resultText = document.getElementById('resultText');
      const resultBtnText = document.getElementById('resultBtnText');
      const q = state.currentCategory.questions[state.selectedQuiz];

      resultText.textContent = q.result;
      resultBtnText.textContent = state.currentCategory.id === 'mom'
        ? '預約小孩八字諮詢'
        : '確認預約服務並傳訊';
    }

    function updateView() {
      const homeView = document.getElementById('homeView');
      const quizView = document.getElementById('quizView');
      const resultView = document.getElementById('resultView');
      const homeHeader = document.getElementById('homeHeader');

      homeView.classList.add('hidden');
      quizView.classList.add('hidden');
      resultView.classList.add('hidden');

      if (state.step === 'home') {
        homeView.classList.remove('hidden');
        homeHeader.classList.remove('hidden');
      } else if (state.step === 'quiz') {
        quizView.classList.remove('hidden');
        homeHeader.classList.add('hidden');
        renderQuiz();
      } else if (state.step === 'result') {
        resultView.classList.remove('hidden');
        homeHeader.classList.add('hidden');
        renderResult();
      }
    }

    function handleCategorySelect(catKey) {
      state.currentCategory = categories[catKey];
      state.selectedQuiz = null;
      state.step = 'quiz';
      updateView();
    }

    function handleQuizSelect(index) {
      state.selectedQuiz = index;
      state.step = 'result';
      updateView();
    }

    async function handleBooking() {
      const selectedQuestion = state.currentCategory.questions[state.selectedQuiz].text;
      const categoryName = state.currentCategory.title;
      const messageText = `Nina 您好，我剛在 App 完成了檢測：\n\n【類別】：${categoryName}\n【問題】：${selectedQuestion}\n\n我想預約進一步的${state.currentCategory.id === 'mom' ? '小孩八字諮詢' : '深度諮詢/祈福服務'}，請幫我安排時間，謝謝！`;

      if (window.liff && typeof window.liff.isInClient === 'function' && window.liff.isInClient()) {
        try {
          await window.liff.sendMessages([{ type: 'text', text: messageText }]);
          if (typeof window.liff.closeWindow === 'function') {
            window.liff.closeWindow();
          }
        } catch (error) {
          window.location.href = `https://line.me/R/oaMessage/@455tjzbh/?${encodeURIComponent(messageText)}`;
        }
      } else {
        window.location.href = `https://line.me/R/oaMessage/@455tjzbh/?${encodeURIComponent(messageText)}`;
      }
    }

    function reset() {
      state.step = 'home';
      state.currentCategory = null;
      state.selectedQuiz = null;
      updateView();
    }

    document.addEventListener('DOMContentLoaded', () => {
      setFixedIcons();
      renderCategories();
      updateView();

      document.getElementById('backBtn').addEventListener('click', reset);
      document.getElementById('resultBtn').addEventListener('click', handleBooking);
    });
  </script>
</body>
</html>
